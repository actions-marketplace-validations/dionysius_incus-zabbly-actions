name: Integration

on:
  push:
    branches: ['**']   # any branch (not tags)
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Lint the workflows for security issues (zizmor). The instance matrix is gated on this passing,
  # so a finding halts the expensive run.
  security:
    name: GHA security analysis (zizmor)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7

  instance:
    needs: security
    name: ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.channel }} / ${{ matrix.type }}
    # arm64 hosted runners use the -arm label suffix.
    runs-on: ${{ matrix.arch == 'arm64' && format('ubuntu-{0}-arm', matrix.os) || format('ubuntu-{0}', matrix.os) }}
    strategy:
      fail-fast: false
      matrix:
        os: ['22.04', '24.04']
        channel: ['stable', 'lts-7.0', 'lts-6.0']
        arch: ['amd64', 'arm64']
        type: ['container', 'vm']
        # arm64 hosted runners have no /dev/kvm, so they can't run VMs — drop those legs.
        exclude:
          - { arch: arm64, type: vm }
        # Per-type launch parameters, merged into the matching legs.
        include:
          - { type: container, image: 'images:debian/trixie/cloud', wait: 'cloud-init', config: '' }
          - { type: vm,        image: 'images:debian/trixie',       wait: 'exec',       config: "limits.cpu=2\nlimits.memory=2GiB" }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Zabbly Incus
        id: setup
        uses: ./setup
        with:
          channel: ${{ matrix.channel }}

      - name: Report environment
        run: |
          {
            echo "### ${{ matrix.os }} / ${{ matrix.arch }} / ${{ matrix.channel }} / ${{ matrix.type }} — environment"
            echo '```'
            echo "runner:  $(. /etc/os-release; echo "$PRETTY_NAME") $(uname -m)"
            echo "incus:   ${{ steps.setup.outputs.incus-version }}"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Launch the instance (launch action)
        uses: ./launch
        with:
          image: ${{ matrix.image }}
          name: i1
          vm: ${{ matrix.type == 'vm' }}
          wait: ${{ matrix.wait }}
          config: ${{ matrix.config }}

      # exec smoke; apt-get update also proves outbound traffic through the DOCKER-USER-governed FORWARD path.
      - name: Exec + outbound network (exec action)
        uses: ./exec
        with:
          instance: i1
          run: |
            cat /etc/os-release
            apt-get update
            echo NET=OK

      # Mount round-trip: the host checkout is visible inside, and a file written inside lands on the host.
      - name: Workspace mount round-trip (exec action)
        uses: ./exec
        with:
          instance: i1
          run: |
            test -f README.md
            echo written-by-i1 > mount-probe.txt
      - name: Verify mount write reached the host (runner-owned + writable)
        run: |
          set -euo pipefail
          grep -q written-by-i1 mount-probe.txt
          ls -l mount-probe.txt
          # The instance's root maps to the runner, so its writes are runner-owned and host-writable.
          owner=$(stat -c '%u:%g' mount-probe.txt)
          [ "$owner" = "$(id -u):$(id -g)" ] || { echo "::error::mount-probe.txt owned by $owner, expected runner $(id -u):$(id -g)"; exit 1; }
          echo host-can-modify >> mount-probe.txt

      # env forwarding (runner env visible inside), $GITHUB_ENV bridge, $GITHUB_STEP_SUMMARY, and $INCUS_RESULT capture.
      - name: Env forwarding + GITHUB_ENV bridge + output (exec action)
        id: smoke
        uses: ./exec
        with:
          instance: i1
          run: |
            test -n "$GITHUB_REPOSITORY"
            echo "SMOKE_ENV=ok-$GITHUB_RUN_ID" >> "$GITHUB_ENV"
            echo "- exec smoke on run $GITHUB_RUN_ID (${{ matrix.type }})" >> "$GITHUB_STEP_SUMMARY"
            echo "marker-$GITHUB_RUN_ID" >> "$INCUS_RESULT"
      - name: Verify env bridge + output
        env:
          SMOKE_OUTPUT: ${{ steps.smoke.outputs.result }}
        run: |
          set -euo pipefail
          test "$SMOKE_ENV" = "ok-$GITHUB_RUN_ID"
          echo "$SMOKE_OUTPUT" | grep -q "marker-$GITHUB_RUN_ID"
          echo "env bridge + output OK"

      # Discovery: what uid/gid the instance runs as, and how the shared paths + a file it writes look
      # from the host vs from inside — to see the idmap.
      - name: Discovery — ids, ownership, perms
        run: |
          set +e
          probe="$GITHUB_WORKSPACE/.disco"
          incus exec i1 -- sh -c "echo x > '$probe'" 2>/dev/null
          {
            echo "### Discovery — ${{ matrix.type }} i1"
            echo '```'
            echo "running user — host $(id -u):$(id -g) ($(id -un)), inside i1 $(incus exec i1 -- id -u):$(incus exec i1 -- id -g)"
            echo
            printf '%-12s %-14s %-14s %s\n' item host-owner in-owner perms
            for spec in "workspace:$GITHUB_WORKSPACE" "runner_temp:$RUNNER_TEMP" "github_env:$GITHUB_ENV" "probe-file:$probe"; do
              label=${spec%%:*}; p=${spec#*:}
              printf '%-12s %-14s %-14s %s\n' "$label" \
                "$(stat -c '%u:%g' "$p" 2>/dev/null || echo -)" \
                "$(incus exec i1 -- stat -c '%u:%g' "$p" 2>/dev/null || echo -)" \
                "$(stat -c '%a' "$p" 2>/dev/null || echo -)"
            done
            echo
            rd=$(cat "$probe" >/dev/null 2>&1 && echo yes || echo no)
            wr=$( (: >>"$probe") 2>/dev/null && echo yes || echo no)
            echo "host access to the file i1 created: read=$rd write=$wr"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
          rm -f "$probe"

      # VM-only fidelity check: a real VM applies systemd sandbox directives that a system container masks.
      # Assert four, each on a different subsystem (each grep -q is an assertion):
      #   ProcSubset=pid          -> /proc/cpuinfo hidden       (CPUINFO=BLOCKED)
      #   ProtectKernelTunables   -> /proc/sys read-only        (PROCSYS=READONLY)
      #   ProtectSystem=strict    -> /usr read-only             (USR=READONLY)
      #   ProtectControlGroups    -> /sys/fs/cgroup read-only   (CGROUP=READONLY)
      - name: VM sandbox-fidelity probe (exec action)
        if: matrix.type == 'vm'
        uses: ./exec
        with:
          instance: i1
          shell: bash
          run: |
            echo "guest: $(. /etc/os-release; echo "$PRETTY_NAME")"
            systemctl --version | head -1
            # Probe script (printf, not heredoc, to stay in the YAML block scalar). Runs as root, so
            # only the sandbox blocks these writes. No set -e: every check must run.
            printf "%s\n" \
              "#!/bin/sh" \
              "cat /proc/cpuinfo >/dev/null 2>&1 && echo CPUINFO=READABLE || echo CPUINFO=BLOCKED" \
              "if ( echo 0 >/proc/sys/kernel/dmesg_restrict ) 2>/dev/null; then echo PROCSYS=WRITABLE; else echo PROCSYS=READONLY; fi" \
              "if ( touch /usr/.sandbox-probe ) 2>/dev/null; then echo USR=WRITABLE; rm -f /usr/.sandbox-probe; else echo USR=READONLY; fi" \
              "if ( mkdir /sys/fs/cgroup/.sandbox-probe ) 2>/dev/null; then echo CGROUP=WRITABLE; rmdir /sys/fs/cgroup/.sandbox-probe; else echo CGROUP=READONLY; fi" \
              "exit 0" \
              > /usr/local/bin/sandbox-probe.sh
            chmod +x /usr/local/bin/sandbox-probe.sh
            printf "%s\n" \
              "[Service]" \
              "Type=oneshot" \
              "ProtectSystem=strict" \
              "ProtectProc=noaccess" \
              "ProcSubset=pid" \
              "ProtectKernelTunables=true" \
              "ProtectControlGroups=true" \
              "ExecStart=/usr/local/bin/sandbox-probe.sh" \
              > /etc/systemd/system/sandbox-probe.service
            systemctl daemon-reload
            systemctl start sandbox-probe.service
            out=$(journalctl -u sandbox-probe.service -o cat)
            echo "$out"
            echo "$out" | grep -q CPUINFO=BLOCKED
            echo "$out" | grep -q PROCSYS=READONLY
            echo "$out" | grep -q USR=READONLY
            echo "$out" | grep -q CGROUP=READONLY

      # Teardown, also dogfooding the delete + cleanup actions.
      - name: Delete the instance (delete action)
        if: always()
        uses: ./delete
        with:
          name: i1
      - name: Cleanup Incus (cleanup action)
        if: always()
        uses: ./cleanup
        with:
          instances: false   # the delete step above already removed i1
      - name: Verify cleanup removed incus + repo
        if: always()
        run: |
          set -euo pipefail
          ! command -v incus >/dev/null 2>&1 || { echo "::error::incus binary still present after cleanup"; exit 1; }
          test ! -e /etc/apt/sources.list.d/zabbly-incus.sources || { echo "::error::apt source remains after cleanup"; exit 1; }
          test ! -e /etc/apt/keyrings/zabbly.asc || { echo "::error::keyring remains after cleanup"; exit 1; }
          echo "cleanup OK"
