name: 'Launch an Incus instance'
description: 'Launch an Incus instance (container or VM) and optionally wait until it is usable'
branding:
  icon: 'play'
  color: 'blue'

inputs:
  image:
    description: 'Image to launch, e.g. images:debian/trixie'
    required: true
  name:
    default: ''
    description: 'Name for the new instance (empty = let Incus generate one; the chosen name is returned as the name output)'
    required: false
  vm:
    default: 'false'
    description: 'Launch as a virtual machine instead of a system container (true/false)'
    required: false
  ephemeral:
    default: 'false'
    description: 'Make the instance ephemeral, so Incus deletes it when it stops (true/false)'
    required: false
  config:
    default: ''
    description: 'Newline-separated KEY=VALUE instance config (each becomes -c KEY=VALUE), e.g. limits.cpu=2'
    required: false
  profiles:
    default: ''
    description: 'Comma-separated profiles to apply (each becomes -p NAME)'
    required: false
  workspace:
    default: 'true'
    description: 'Share the workspace ($GITHUB_WORKSPACE) into the instance at the same path (true/false)'
    required: false
  idmap:
    default: 'auto'
    description: 'Root UID/GID mapping on the shared mounts: auto (map instance root to the runner so its files come out runner-owned), none (no raw.idmap — stock Incus ownership), or a verbatim raw.idmap payload (e.g. both 1000 1000)'
    required: false
  wait:
    default: 'exec'
    description: 'Wait before returning: none | exec (until "incus exec" works) | cloud-init (exec, then "cloud-init status --wait")'
    required: false
  timeout:
    default: '120'
    description: 'Seconds to wait for exec readiness when wait is exec/cloud-init'
    required: false

outputs:
  name:
    description: 'Name of the launched instance (the given name, or the one Incus generated)'
    value: '${{ steps.launch.outputs.name }}'

runs:
  using: composite
  steps:
    - id: launch
      shell: bash
      env:
        INCUS_INPUT_IMAGE: '${{ inputs.image }}'
        INCUS_INPUT_NAME: '${{ inputs.name }}'
        INCUS_INPUT_VM: '${{ inputs.vm }}'
        INCUS_INPUT_EPHEMERAL: '${{ inputs.ephemeral }}'
        INCUS_INPUT_CONFIG: '${{ inputs.config }}'
        INCUS_INPUT_PROFILES: '${{ inputs.profiles }}'
        INCUS_INPUT_WORKSPACE: '${{ inputs.workspace }}'
        INCUS_INPUT_IDMAP: '${{ inputs.idmap }}'
        INCUS_INPUT_WAIT: '${{ inputs.wait }}'
        INCUS_INPUT_TIMEOUT: '${{ inputs.timeout }}'
      run: |
        set -euo pipefail
        case "$INCUS_INPUT_VM" in true|false) ;; *) echo "::error::vm must be true or false (got: $INCUS_INPUT_VM)"; exit 1;; esac
        case "$INCUS_INPUT_EPHEMERAL" in true|false) ;; *) echo "::error::ephemeral must be true or false (got: $INCUS_INPUT_EPHEMERAL)"; exit 1;; esac
        case "$INCUS_INPUT_WORKSPACE" in true|false) ;; *) echo "::error::workspace must be true or false (got: $INCUS_INPUT_WORKSPACE)"; exit 1;; esac
        case "$INCUS_INPUT_WAIT" in none|exec|cloud-init) ;; *) echo "::error::wait must be none | exec | cloud-init (got: $INCUS_INPUT_WAIT)"; exit 1;; esac
        case "$INCUS_INPUT_TIMEOUT" in ''|*[!0-9]*) echo "::error::timeout must be a positive integer of seconds (got: $INCUS_INPUT_TIMEOUT)"; exit 1;; esac

        # init (not launch), so config + shared disk devices can be applied before the instance starts.
        args=(init "$INCUS_INPUT_IMAGE")
        [ -n "$INCUS_INPUT_NAME" ] && args+=("$INCUS_INPUT_NAME")
        [ "$INCUS_INPUT_VM" = true ] && args+=(--vm)
        [ "$INCUS_INPUT_EPHEMERAL" = true ] && args+=(--ephemeral)
        # raw.idmap maps the instance's root to the runner's uid/gid, so root inside keeps full capability
        # but its writes on the shared mounts come out runner-owned (not root) on the host — same result
        # for containers (user namespace) and VMs (virtiofsd --translate-uid/--translate-gid).
        case "$INCUS_INPUT_IDMAP" in
          auto)    args+=(-c "raw.idmap=$(printf 'uid %s 0\ngid %s 0' "$(id -u)" "$(id -g)")") ;;
          none|'') : ;;
          *)       args+=(-c "raw.idmap=$INCUS_INPUT_IDMAP") ;;
        esac
        # Instance config, one -c KEY=VALUE per non-empty line.
        if [ -n "$INCUS_INPUT_CONFIG" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] || continue
            args+=(-c "$line")
          done <<<"$INCUS_INPUT_CONFIG"
        fi
        # Profiles, one -p NAME per comma-separated entry.
        if [ -n "$INCUS_INPUT_PROFILES" ]; then
          IFS=',' read -ra PR <<<"$INCUS_INPUT_PROFILES"
          for p in "${PR[@]}"; do
            p="$(echo "$p" | xargs)"  # trim
            [ -n "$p" ] && args+=(-p "$p")
          done
        fi
        # Run init. With no name given, incus generates one and prints "Instance name is: <name>" on stdout.
        name="$INCUS_INPUT_NAME"
        if [ -n "$name" ]; then
          incus "${args[@]}"
        else
          out="$(incus "${args[@]}")"
          printf '%s\n' "$out"
          # incus prints "Instance name is: <name>"; image-download progress uses \r, so strip it and
          # match anywhere on the line rather than anchoring at the start.
          name="$(printf '%s\n' "$out" | tr -d '\r' | sed -n 's/.*Instance name is: //p' | tail -n1)"
          [ -n "$name" ] || { echo "::error::could not determine the name Incus generated"; exit 1; }
        fi
        echo "name=$name" >> "$GITHUB_OUTPUT"
        # Share host dirs at their real paths (the workspace, and $RUNNER_TEMP) — both back the exec action.
        [ "$INCUS_INPUT_WORKSPACE" = true ] && incus config device add "$name" workspace disk source="$GITHUB_WORKSPACE" path="$GITHUB_WORKSPACE" >/dev/null
        [ -n "${RUNNER_TEMP:-}" ] && incus config device add "$name" github-temp disk source="$RUNNER_TEMP" path="$RUNNER_TEMP" >/dev/null
        if ! incus start "$name"; then
          echo "::group::$name start log"
          incus info "$name" --show-log 2>&1 || true
          echo "::endgroup::"
          exit 1
        fi

        # Wait until "incus exec" works (a fresh VM's agent takes a few seconds; containers are instant).
        if [ "$INCUS_INPUT_WAIT" != none ]; then
          end=$((SECONDS + INCUS_INPUT_TIMEOUT))
          until incus exec "$name" -- true 2>/dev/null; do
            if [ "$SECONDS" -ge "$end" ]; then
              echo "::error::instance $name not reachable via incus exec after ${INCUS_INPUT_TIMEOUT}s"
              exit 1
            fi
            sleep 2
          done
          if [ "$INCUS_INPUT_WAIT" = cloud-init ]; then
            incus exec "$name" -- cloud-init status --wait
          fi
        fi
