name: 'Zabbly Incus for GitHub Actions'
description: "Stub — don't use directly. Use a sub-action: setup, launch, exec, delete, or cleanup. See the README."
branding:
  icon: 'box'
  color: 'blue'

# This repo is a collection; the real actions live in subfolders and are used as
# dionysius/incus-zabbly-actions/<name>@vX. This root action exists only so the repo can be listed
# on the Marketplace — using it directly is a mistake, so it fails loudly.
runs:
  using: composite
  steps:
    - name: 'Stub'
      shell: bash
      run: |
        echo "::error::incus-zabbly-actions is a collection — use a sub-action instead, e.g. dionysius/incus-zabbly-actions/setup@v1. See https://github.com/dionysius/incus-zabbly-actions#actions"
        exit 1
